name: Deploy to wet3.camp

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 157.250.205.180
          username: admin
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: 22
          command_timeout: 12m
          script: |
            set -e
            git config --global --add safe.directory /home/admin/wet3camp-build 2>/dev/null || true
            rm -f /home/admin/wet3camp-build/.git/index.lock \
                  /home/admin/wet3camp-build/.git/config.lock \
                  /home/admin/wet3camp-build/.git/refs/heads/main.lock 2>/dev/null || true
            cd /home/admin/wet3camp-build
            bash deploy-on-server.sh
            echo "✅ Auto-deploy complete at $(date)"

      - name: Ping IndexNow (Bing/Yandex instant indexing)
        run: |
          curl -s -X POST https://wet3.camp/api/seo/indexnow -o /tmp/indexnow.json || true
          cat /tmp/indexnow.json || true
