name: Deploy to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DirectAdmin server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 157.250.205.180
          username: admin
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: 22
          script: |
            set -e
            cd /home/admin/wet3camp-build

            # Remove any stale git lock
            rm -f .git/index.lock .git/config.lock .git/refs/heads/main.lock

            git pull origin main

            # Rebuild & restart API server
            cd artifacts/api-server
            pnpm run build
            pm2 restart wet3camp-api

            # Build frontend and copy to public_html
            cd ../../artifacts/wet3camp
            NODE_ENV=production pnpm run build
            cp -r dist/public/* /home/admin/domains/wet3.camp/public_html/

            echo "Deployed at $(date)"
