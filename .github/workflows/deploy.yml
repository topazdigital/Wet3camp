name: Deploy to wet3.camp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: PORT=19099 BASE_PATH=/ pnpm --filter @workspace/wet3camp run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          script: |
            set -e

            # ── Frontend ──────────────────────────────────────────
            rm -rf /home/admin/domains/wet3.camp/public_html/*
            mkdir -p /home/admin/domains/wet3.camp/public_html

            # ── API server ────────────────────────────────────────
            mkdir -p /home/admin/api-server
            cd /home/admin/api-server
            pm2 stop wet3camp-api 2>/dev/null || true

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "artifacts/wet3camp/dist/public/*"
          target: "/home/admin/domains/wet3.camp/public_html"
          strip_components: 4

      - name: Upload API server build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "artifacts/api-server/dist/*,artifacts/api-server/package.json"
          target: "/home/admin/api-server"
          strip_components: 2

      - name: Start API server with PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          script: |
            cd /home/admin/api-server
            npm install --omit=dev --no-package-lock 2>/dev/null || true
            pm2 delete wet3camp-api 2>/dev/null || true
            pm2 start dist/index.mjs --name wet3camp-api \
              --env DB_HOST=localhost \
              --env DB_USER=$DB_USER \
              --env DB_PASS=$DB_PASS \
              --env DB_NAME=$DB_NAME \
              --env JWT_SECRET=$JWT_SECRET \
              --env PORT=8080 \
              --node-args="--enable-source-maps"
            pm2 save
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
