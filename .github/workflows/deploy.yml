name: Deploy to wet3.camp

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 157.250.205.180
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 600s
          command_timeout: 10m
          script: |
            set -e
            cd /home/admin/wet3camp-build
            git config --global --add safe.directory /home/admin/wet3camp-build 2>/dev/null || true
            echo "==> Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main
            echo "==> Running deploy script..."
            bash /home/admin/wet3camp-build/deploy-on-server.sh
