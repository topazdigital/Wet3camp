<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a0000"/>
      <stop offset="1" stop-color="#080000"/>
    </linearGradient>
    <linearGradient id="gld" x1="90" y1="10" x2="90" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE066"/>
      <stop offset="0.5" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FF8C00"/>
    </linearGradient>
    <radialGradient id="glow" cx="90" cy="100" r="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B0000" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8B0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <!-- Soft red glow behind figure -->
  <ellipse cx="90" cy="104" rx="68" ry="68" fill="url(#glow)"/>

  <!-- Star / crown spark above head -->
  <path d="M90 8 L92.8 14.5 L99.8 14.5 L94.3 18.8 L96.6 25.5 L90 21.4 L83.4 25.5 L85.7 18.8 L80.2 14.5 L87.2 14.5 Z" fill="#FFD700"/>

  <!-- Hair: top flow and body -->
  <path d="M68 46 C65 27 72 14 90 18 C108 14 115 27 112 46 C119 38 120 56 115 68 C108 59 103 80 100 80 L80 80 C77 80 72 59 65 68 C60 56 61 38 68 46 Z" fill="url(#gld)"/>
  <!-- Hair flowing side (right) -->
  <path d="M112 52 C120 63 120 82 114 98 C118 88 122 74 118 58 Z" fill="url(#gld)" opacity="0.55"/>
  <!-- Hair flowing side (left) faint -->
  <path d="M68 52 C60 63 60 82 66 98 C62 88 58 74 62 58 Z" fill="url(#gld)" opacity="0.3"/>

  <!-- Head -->
  <ellipse cx="90" cy="55" rx="21" ry="23" fill="url(#gld)"/>
  <!-- Face sheen -->
  <ellipse cx="84" cy="48" rx="6" ry="7" fill="#fff" opacity="0.10" transform="rotate(-15 84 48)"/>

  <!-- Neck -->
  <path d="M82 77 L84 92 L96 92 L98 77 Q94 80 90 80 Q86 80 82 77 Z" fill="url(#gld)"/>

  <!-- Shoulders + bust silhouette -->
  <path d="M26 152 C34 112 56 97 78 91 C82 89 86 88 90 88 C94 88 98 89 102 91 C124 97 146 112 154 152 Z" fill="url(#gld)"/>

  <!-- Lower dress / body -->
  <path d="M33 152 C48 136 68 128 90 128 C112 128 132 136 147 152 L152 180 L28 180 Z" fill="url(#gld)" opacity="0.38"/>

  <!-- Small red heart detail on chest -->
  <path d="M90 106 C90 106 82 100 82 95 C82 91 85 89 87.5 91 C88.8 92 90 94 90 94 C90 94 91.2 92 92.5 91 C95 89 98 91 98 95 C98 100 90 106 90 106 Z" fill="#8B0000" opacity="0.6"/>
</svg>
