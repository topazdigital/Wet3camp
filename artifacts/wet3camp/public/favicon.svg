<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#160000"/>
      <stop offset="1" stop-color="#060000"/>
    </linearGradient>
    <linearGradient id="g" x1="90" y1="12" x2="90" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE566"/>
      <stop offset="0.45" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#B06000"/>
    </linearGradient>
    <radialGradient id="gl" cx="90" cy="90" r="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B0000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect width="180" height="180" rx="36" fill="url(#gl)"/>

  <!-- HAIR: large flowing mass to the LEFT of the head — key visual that makes this NOT a user avatar -->
  <path d="M 96 28 C 80 20 57 18 38 26 C 19 34 10 52 12 70 C 14 86 26 96 42 94 C 55 92 64 82 61 70 C 56 76 49 80 44 74 C 38 66 42 54 54 47 C 66 40 80 44 88 56 C 91 47 94 36 96 28 Z" fill="url(#g)"/>

  <!-- HEAD: circle positioned at upper-right, clearly side-profile -->
