  <!-- NECK connecting hair/head to body -->
  <path d="M 98 58 L 99 70 L 113 72 L 114 60 Q 107 64 98 58 Z" fill="url(#g)"/>

  <!-- BODY back-side: from neck down the back -->
  <path d="M 111 70 C 105 78 98 90 95 105 C 92 119 91 134 88 148 C 86 158 83 164 81 170 L 97 172 C 100 162 103 151 107 139 C 111 125 115 110 119 97 C 123 85 126 74 124 67 C 120 64 115 65 111 70 Z" fill="url(#g)"/>

  <!-- BUST + FRONT body: breast curve clearly visible — clearly feminine -->
  <path d="M 124 68 C 134 77 138 93 134 109 C 130 124 121 137 116 152 C 112 163 111 170 114 174 L 98 172 C 101 162 104 152 108 140 C 112 127 118 113 122 100 C 126 88 127 78 124 68 Z" fill="url(#g)"/>

  <!-- KNEELING LEGS: two rounded bumps at bottom, clearly kneeling pose -->
  <ellipse cx="86" cy="168" rx="17" ry="7" fill="url(#g)"/>
  <ellipse cx="113" cy="170" rx="15" ry="6" fill="url(#g)"/>

  <!-- Ground/feet hint -->
